<!DOCTYPE html>
<html>
<head>

<title>Assign Roles</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Assign Roles</h2>

<table class="table table-bordered">

<tr>
<th>Name</th>
<th>Email</th>
<th>Current Role</th>
<th>Change Role</th>
</tr>

{% for user in users %}

<tr>

<td>{{ user.username }}</td>

<td>{{ user.email }}</td>

<td>{{ user.role }}</td>

<td>

<form method="POST">

<input
type="hidden"
name="user_id"
value="{{ user.id }}">

<select
name="role"
class="form-select">

<option>Student</option>
<option>Teacher</option>

</select>

<button
class="btn btn-primary mt-2">

Update Role

</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
