<!DOCTYPE html>
<html>

<head>

<title>System Monitoring</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>System Statistics</h2>

<div class="row">

<div class="col-md-4">
<div class="card shadow">
<div class="card-body">
<h5>Total Users</h5>
<h2>{{ total_users }}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow">
<div class="card-body">
<h5>Total Students</h5>
<h2>{{ total_students }}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow">
<div class="card-body">
<h5>Total Teachers</h5>
<h2>{{ total_teachers }}</h2>
</div>
</div>
</div>

</div>

<br>

<div class="row">

<div class="col-md-4">
<div class="card shadow">
<div class="card-body">
<h5>Total Courses</h5>
<h2>{{ total_courses }}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow">
<div class="card-body">
<h5>Total Assignments</h5>
<h2>{{ total_assignments }}</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card shadow">
<div class="card-body">
<h5>Total Enrollments</h5>
<h2>{{ total_enrollments }}</h2>
</div>
</div>
</div>

</div>

</div>

</body>

</html>
