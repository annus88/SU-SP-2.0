<!DOCTYPE html>
<html>

<head>

<title>Teacher Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">

<div class="container-fluid">

<span class="navbar-brand">

Teacher Dashboard

</span>

<a href="/logout" class="btn btn-light">

Logout

</a>

</div>

</nav>

<div class="container mt-5">

<div class="row g-4">

<!-- Create Assignment -->

<div class="col-md-3">

<div class="card shadow h-100">

<div class="card-body text-center">

<h5>Create Assignment</h5>

<p>
Create coursework for students.
</p>

<a
href="/teacher/create_assignment"
class="btn btn-success">

Open

</a>

</div>

</div>

</div>

<!-- Review Submissions -->

<div class="col-md-3">

<div class="card shadow h-100">

<div class="card-body text-center">

<h5>Review Submissions</h5>

<p>
Review and grade student work.
</p>

<a
href="/teacher/review"
class="btn btn-primary">

Open

</a>

</div>

</div>

</div>

<!-- Manage Courses -->

<div class="col-md-3">

<div class="card shadow h-100">

<div class="card-body text-center">

<h5>Manage Courses</h5>

<p>
Create and manage courses.
</p>

<a
href="/teacher/courses"
class="btn btn-dark">

Open

</a>

</div>

</div>

</div>

<!-- View Enrollments -->

<div class="col-md-3">

<div class="card shadow h-100">

<div class="card-body text-center">

<h5>View Enrollments</h5>

<p>
See which students joined courses.
</p>

<a
href="/teacher/enrollments"
class="btn btn-info">

Open

</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
