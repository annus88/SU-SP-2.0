<!DOCTYPE html>
<html>

<head>

<title>Reports</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Project Reports</h2>

<div class="card mb-4">
<div class="card-header bg-primary text-white">
Enrollment Report
</div>

<div class="card-body">

<table class="table">

<tr>
<th>Student</th>
<th>Course</th>
</tr>

{% for e in enrollments %}

<tr>
<td>{{ e.student_name }}</td>
<td>{{ e.course_name }}</td>
</tr>

{% endfor %}

</table>

</div>
</div>

<div class="card mb-4">

<div class="card-header bg-success text-white">
Grade Report
</div>

<div class="card-body">

<table class="table">

<tr>
<th>Student ID</th>
<th>Marks</th>
<th>Grade</th>
</tr>

{% for g in grades %}

<tr>
<td>{{ g.student_id }}</td>
<td>{{ g.marks }}</td>
<td>{{ g.grade }}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

</div>

</body>

</html>
