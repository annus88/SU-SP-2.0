<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">
Admin Dashboard
</span>

<a href="/logout" class="btn btn-light">
Logout
</a>

</div>

</nav>

<div class="container mt-5">

<div class="row g-4">

<!-- Manage Users -->

<div class="col-md-3">

<div class="card shadow h-100">

<div class="card-body text-center">

<h5>Manage Users</h5>

<p>
View and delete students and teachers.
</p>

<a
href="/admin/users"
class="btn btn-primary">

Open

</a>

</div>

</div>

</div>

<!-- Assign Roles -->

<div class="col-md-3">

<div class="card shadow h-100">

<div class="card-body text-center">

<h5>Assign Roles</h5>

<p>
Change Student and Teacher roles.
</p>

<a
href="/admin/roles"
class="btn btn-success">

Open

</a>

</div>

</div>

</div>

<!-- System Monitoring -->

<div class="col-md-3">

<div class="card shadow h-100">

<div class="card-body text-center">

<h5>System Monitoring</h5>

<p>
Monitor portal statistics and activity.
</p>

<a
href="/admin/monitor"
class="btn btn-warning">

Open

</a>

</div>

</div>

</div>

<!-- Reports -->

<div class="col-md-3">

<div class="card shadow h-100">

<div class="card-body text-center">

<h5>Reports</h5>

<p>
Enrollment and grading reports.
</p>

<a
href="/admin/reports"
class="btn btn-info">

Open

</a>

</div>

</div>

</div>

</div>

</div>

</html>
